<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>訂單總覽</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial;
    padding: 10px;
    background: #f8f9fa;
}

.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}

.order {
    background: white;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}

.order-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 8px;
}

.item,
.edit-item {
    font-size: 14px;
    color: #333;
}

.item {
    padding-left: 10px;
}

.edit-item {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 90px 90px 44px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
}

.add-row {
    display: grid;
    grid-template-columns: minmax(120px, 1.1fr) minmax(90px, 1fr) 80px 70px;
    gap: 6px;
    margin-top: 10px;
}

.actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 10px;
}

@media (max-width: 768px) {
    .order-title {
        align-items: flex-start;
        flex-direction: column;
    }

    .edit-item,
    .add-row {
        grid-template-columns: 1fr;
    }

    .actions {
        justify-content: stretch;
    }

    .actions button {
        flex: 1;
    }
}
</style>
</head>

<body>

<div class="toolbar">
    <h3 class="m-0">📦 訂單總覽</h3>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="loadData()">重新整理</button>
        <a class="btn btn-outline-secondary btn-sm" href="/sheet_check" target="_blank">欄位檢查</a>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">登出</a>
    </div>
</div>

<div id="list">載入中...</div>

<script>
let orders = [];
let products = [];
let editingId = null;

function escapeHtml(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatGroup(g){
    if(g === "P") return "個人";

    if(typeof g === "number"){
        return g + "組";
    }

    if(typeof g === "string"){
        if(g.startsWith("G")){
            return g.replace("G","") + "組";
        }
        return g;
    }

    return "";
}

function groupOptions(selected){
    let html = "";

    for(let i = 1; i <= 15; i++){
        const value = "G" + String(i).padStart(2, "0");
        html += `<option value="${value}" ${value === selected ? "selected" : ""}>${i}組</option>`;
    }

    html += `<option value="P" ${selected === "P" ? "selected" : ""}>個人</option>`;
    return html;
}

function productOptions(){
    let html = `<option value="">選擇商品</option>`;

    products.forEach((product, index) => {
        html += `<option value="${index}">${escapeHtml(product.name)}</option>`;
    });

    return html;
}

function sizeOptions(productIndex){
    const product = products[Number(productIndex)];

    if(!product){
        return `<option value="">選擇尺寸</option>`;
    }

    let html = `<option value="">選擇尺寸</option>`;

    (product.sizes || []).forEach((size, index) => {
        html += `<option value="${index}">${escapeHtml(size.size)} - ${Number(size.price || 0)}</option>`;
    });

    return html;
}

async function loadData(){
    document.getElementById("list").innerHTML = "載入中...";

    try {
        const [ordersResponse, productsResponse] = await Promise.all([
            fetch("/orders"),
            fetch("/products_grouped")
        ]);

        const ordersText = await ordersResponse.text();

        try {
            orders = JSON.parse(ordersText);
        } catch (e) {
            console.error("API不是JSON:", ordersText);
            document.getElementById("list").innerHTML = "後端錯誤（請看 Flask console）";
            return;
        }

        products = await productsResponse.json();
        renderOrders();
    } catch (err) {
        console.error("orders error:", err);
        document.getElementById("list").innerHTML = "載入失敗（請看 console）";
    }
}

function renderOrders(){
    if(!Array.isArray(orders) || orders.length === 0){
        document.getElementById("list").innerHTML = "沒有訂單";
        return;
    }

    document.getElementById("list").innerHTML = orders.map(order => {
        if(editingId === order.order_id){
            return renderEditOrder(order);
        }

        return renderReadOnlyOrder(order);
    }).join("");
}

function renderReadOnlyOrder(order){
    const total = Number(order.total || 0);
    const items = (order.items || []).map(item => {
        const name = item.product_name || item.name || "";
        const size = item.size || "";
        const qty = Number(item.qty || 0);
        const price = Number(item.price || 0);

        if(!name) return "";

        return `
            <div class="item">
                ${escapeHtml(name)} ${size ? escapeHtml(size) : ""} x ${qty} = ${price * qty}
            </div>`;
    }).join("");

    return `
        <div class="order">
            <div class="order-title">
                <span>訂單：${escapeHtml(order.order_id)} ｜ 組別：${formatGroup(order.group)} ｜ 總額：${total}</span>
                <button class="btn btn-outline-primary btn-sm" onclick="editOrder('${escapeHtml(order.order_id)}')">修改</button>
            </div>
            ${items}
        </div>`;
}

function renderEditOrder(order){
    const items = (order.items || []).map((item, index) => {
        const name = item.product_name || item.name || "";
        const size = item.size || "";
        const qty = Number(item.qty || 0);
        const price = Number(item.price || 0);

        return `
            <div class="edit-item">
                <div>${escapeHtml(name)} ${size ? escapeHtml(size) : ""}<br><small>單價：${price}</small></div>
                <input class="form-control form-control-sm" type="number" min="1" value="${qty}" id="qty-${index}">
                <div>${price * qty}</div>
                <button class="btn btn-outline-danger btn-sm" onclick="removeEditItem(${index})">X</button>
            </div>`;
    }).join("");

    return `
        <div class="order">
            <div class="order-title">
                <span>修改訂單：${escapeHtml(order.order_id)}</span>
            </div>

            <label class="form-label mb-1">組別</label>
            <select class="form-select form-select-sm mb-2" id="editGroup">
                ${groupOptions(order.group)}
            </select>

            <div id="editItems">${items}</div>

            <div class="add-row">
                <select class="form-select form-select-sm" id="addProduct" onchange="changeAddProduct()">
                    ${productOptions()}
                </select>
                <select class="form-select form-select-sm" id="addSize">
                    <option value="">選擇尺寸</option>
                </select>
                <input class="form-control form-control-sm" id="addQty" type="number" min="1" value="1">
                <button class="btn btn-outline-success btn-sm" onclick="addEditItem()">新增</button>
            </div>

            <div class="actions">
                <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">取消</button>
                <button class="btn btn-success btn-sm" onclick="saveEdit()">儲存</button>
            </div>
        </div>`;
}

function editOrder(orderId){
    editingId = orderId;
    renderOrders();
}

function cancelEdit(){
    editingId = null;
    renderOrders();
}

function currentEditOrder(){
    return orders.find(order => order.order_id === editingId);
}

function removeEditItem(index){
    const order = currentEditOrder();
    order.items.splice(index, 1);
    renderOrders();
}

function changeAddProduct(){
    document.getElementById("addSize").innerHTML = sizeOptions(document.getElementById("addProduct").value);
}

function addEditItem(){
    const order = currentEditOrder();
    const productIndex = document.getElementById("addProduct").value;
    const sizeIndex = document.getElementById("addSize").value;
    const qty = Number(document.getElementById("addQty").value || 0);
    const product = products[Number(productIndex)];
    const size = product && product.sizes ? product.sizes[Number(sizeIndex)] : null;

    if(!product || !size || qty <= 0){
        alert("請選擇商品、尺寸與數量");
        return;
    }

    const existing = order.items.find(item => item.sku === size.sku);

    if(existing){
        existing.qty = Number(existing.qty || 0) + qty;
    } else {
        order.items.push({
            sku: size.sku,
            name: product.name,
            product_name: product.name,
            size: size.size,
            price: Number(size.price || 0),
            qty
        });
    }

    renderOrders();
}

function collectEditItems(order){
    return (order.items || []).map((item, index) => ({
        sku: item.sku || "",
        name: item.name || item.product_name || "",
        product_name: item.product_name || item.name || "",
        size: item.size || "",
        price: Number(item.price || 0),
        qty: Number(document.getElementById(`qty-${index}`)?.value || item.qty || 0)
    })).filter(item => item.qty > 0);
}

async function saveEdit(){
    const order = currentEditOrder();
    const group = document.getElementById("editGroup").value;
    const items = collectEditItems(order);

    if(items.length === 0){
        alert("訂單至少要有一個品項");
        return;
    }

    try {
        const response = await fetch(`/orders/${encodeURIComponent(order.order_id)}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ group, items })
        });

        const result = await response.json();

        if(!response.ok){
            alert(result.message || "更新失敗");
            return;
        }

        const index = orders.findIndex(item => item.order_id === order.order_id);
        orders[index] = result.order;
        editingId = null;
        renderOrders();
        alert("訂單已更新");
    } catch (err) {
        console.error("save order error:", err);
        alert("更新失敗");
    }
}

window.addEventListener("DOMContentLoaded", loadData);
</script>

</body>
</html>
